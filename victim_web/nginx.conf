# Port 80 — plain HTTP for all existing attack scenarios.
server {
    listen 80;
    listen [::]:80;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }
}

# Port 443 — TLS + HTTP/2 for the Rapid Reset scenario.
# Self-signed cert generated in the Dockerfile; the attack script uses
# ssl.CERT_NONE so certificate validation is not required.
server {
    listen 443 ssl;
    http2  on;

    ssl_certificate     /etc/nginx/ssl/self.crt;
    ssl_certificate_key /etc/nginx/ssl/self.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }
}