name: Mixed Attack (UDP Flood + SSH Brute-Force)
description: >
  Two sequential attacks demonstrating independent detection across protocols.
  Phase 1: UDP flood (volumetric, UDP detector).
  Phase 2: SSH brute-force (credential attack, TCP detector).
  The two phases exercise independent OIF detectors so both should produce
  CRITICAL alerts with distinct attribution features.
  Note: SYN flood was removed — randomised-source-port SYN floods produce
  1-packet flows that are below the min_tcp_pkts threshold and invisible to
  per-flow OIF analysis.

attacker_container: ids_attacker
attacker_ip: "172.20.0.20"

# Multi-phase attacks — list of attack steps executed sequentially.
# Each step waits for the previous to complete before starting.
phases:
  - name: UDP Flood
    script: /attacks/udp_flood.sh
    args: []
    rest_s: 30          # short rest — UDP detector recovers faster than TCP

  - name: SSH Brute-Force
    script: /attacks/ssh_bruteforce.sh
    args: []

baseline:
  auto_baseline: true
  wait_for_ready: true
  timeout_s: 360

recovery:
  monitor_s: 120