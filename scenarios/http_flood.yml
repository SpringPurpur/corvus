name: HTTP GET Flood
description: >
  Apache Benchmark: 10 000 GET requests to victim_web, concurrency 100.
  Unlike a SYN flood, this generates complete TCP flows with real HTTP responses.
  Expected OIF signature: fwd_act_data_pkts>0, psh_flag_cnt high,
  bwd_pkt_len_std>0 (response sizes vary), fwd_pkts_per_sec very high.
  Demonstrates the OIF distinguishing application-layer floods from SYN floods
  — same anomaly class (high rate) but different feature profile.

attacker_container: ids_attacker
attacker_ip: "172.20.0.20"

attack:
  script: /attacks/http_flood.sh
  args: ["10000", "100"]

baseline:
  auto_baseline: true
  wait_for_ready: true
  timeout_s: 360

recovery:
  monitor_s: 60