# dnsmasq.conf — internal DNS for ids_net (172.20.0.0/24)

# Listen on all interfaces, answer UDP/TCP port 53
port=53
bind-interfaces

# Forward unknown queries to Google DNS
server=8.8.8.8
server=8.8.4.4

# Internal hostname records — mesh topology (5 general-purpose nodes)
address=/ids-node-1.ids/172.20.0.10
address=/ids-node-2.ids/172.20.0.11
address=/ids-node-3.ids/172.20.0.12
address=/ids-node-4.ids/172.20.0.13
address=/ids-node-5.ids/172.20.0.14
address=/attacker.ids/172.20.0.20
address=/dns.ids/172.20.0.50
address=/ntp.ids/172.20.0.51

# Cache 1000 entries — produces cache-hit responses (smaller, faster)
# alongside cache-miss forwards (larger responses) for flow diversity
cache-size=1000

# Don't read /etc/resolv.conf or /etc/hosts from the container
no-resolv
no-hosts
