# docker-compose.yml - Corvus IDS core services.
#
# Runs ONLY the capture engine and inference engine.
# No victim nodes, no attacker, no test network - just the IDS.
#
# For the evaluation testbed add the overlay:
#   docker-compose -f docker-compose.yml -f docker-compose.testbed.yml up -d
#
# Interface selection (evaluated in order by capture/start.sh):
#   0. capture.json             - set from the dashboard Settings -> Capture panel
#   1. CAPTURE_INTERFACE=eth0   - explicit, set in .env
#   2. Any UP+PROMISC interface - analyst ran: ip link set <iface> promisc on
#   3. Docker bridge for 172.20.0.0/24 - testbed auto-detect fallback
#
# Authentication:
#   Set CORVUS_API_KEY in .env to require X-API-Key on all API calls.
#   Leave empty to disable (trusted networks / development).
#   See .env.example for all supported variables.

services:

  # Capture engine (C)
  monitor:
    build:
      context: ./capture
      dockerfile: Dockerfile
    container_name: ids_monitor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Host network namespace required to see the monitored interface.
    # Container-mode networking only delivers unicast frames addressed to
    # the container's own MAC; host mode gives the full promiscuous view.
    network_mode: host
    environment:
      - CAPTURE_INTERFACE=${CAPTURE_INTERFACE:-}
      - CAPTURE_FILTER=${CAPTURE_FILTER:-}
    volumes:
      - ./capture:/app/capture
      - ipc_socket:/tmp/ids_ipc
      - ./capture.json:/app/capture.json
    depends_on:
      inference:
        condition: service_healthy
    restart: unless-stopped

  # Inference engine (Python)
  inference:
    build: ./inference
    container_name: ids_inference
    volumes:
      - ipc_socket:/tmp/ids_ipc
      - ./capture.json:/app/capture.json
      - ./dashboard/dist:/app/static:ro
      - ./inference/models:/app/models
      - ./inference/config.json:/app/config.json
      - ./data:/app/data
      # Docker socket - only required for the /dev/fast-baseline endpoint.
      # Remove this line if you don't need that feature.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${CORVUS_PORT:-8765}:8765"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CORVUS_API_KEY=${CORVUS_API_KEY:-}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  ipc_socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
