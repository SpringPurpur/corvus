services:

  # ── Attack simulation targets ──────────────────────────────────────────────
  victim_web:
    build:
      context: ./victim_web
      dockerfile: Dockerfile
    container_name: ids_victim_web
    networks:
      ids_net:
        ipv4_address: 172.20.0.10

  victim_ssh:
    image: linuxserver/openssh-server
    container_name: ids_victim_ssh
    environment:
      - PUID=1000
      - PGID=1000
      - PASSWORD_ACCESS=true
      - USER_PASSWORD=testpass
      - USER_NAME=testuser
    networks:
      ids_net:
        ipv4_address: 172.20.0.11

  # ── UDP infrastructure (DNS + NTP) ────────────────────────────────────────
  dns:
    build:
      context: ./dns
      dockerfile: Dockerfile
    container_name: ids_dns
    networks:
      ids_net:
        ipv4_address: 172.20.0.50

  ntp:
    build:
      context: ./ntp
      dockerfile: Dockerfile
    container_name: ids_ntp
    cap_add:
      - SYS_TIME
    networks:
      ids_net:
        ipv4_address: 172.20.0.51

  # ── Attacker ───────────────────────────────────────────────────────────────
  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: ids_attacker
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      ids_net:
        ipv4_address: 172.20.0.20

  # ── Normal traffic clients (IF baseline + ongoing benign traffic) ──────────
  client_a:
    build:
      context: ./clients
      dockerfile: Dockerfile
    container_name: ids_client_a
    environment:
      - CLIENT_ID=a
    networks:
      ids_net:
        ipv4_address: 172.20.0.40
    depends_on:
      - victim_web
      - victim_ssh
      - dns
      - ntp

  client_b:
    build:
      context: ./clients
      dockerfile: Dockerfile
    container_name: ids_client_b
    environment:
      - CLIENT_ID=b
    networks:
      ids_net:
        ipv4_address: 172.20.0.41
    depends_on:
      - victim_web
      - victim_ssh
      - dns
      - ntp

  # ── Monitor (C capture engine) ─────────────────────────────────────────────
  monitor:
    build:
      context: ./capture
      dockerfile: Dockerfile
    container_name: ids_monitor
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Host network mode: share the VM's network namespace so the capture engine
    # can see the Docker bridge interface (br-XXXXXX) where all inter-container
    # traffic flows. A container's own eth0 in bridge mode only receives unicast
    # frames addressed to it — host mode bypasses this limitation.
    network_mode: host
    environment:
      # Leave empty for auto-detection (finds the Docker bridge for ids_net).
      # For SPAN/TAP port deployments set to the physical NIC, e.g. ens3.
      - CAPTURE_INTERFACE=${CAPTURE_INTERFACE:-}
      # Optional BPF filter, e.g. "ip and not host 192.168.1.1"
      - CAPTURE_FILTER=${CAPTURE_FILTER:-}
    volumes:
      - ./capture:/app/capture
      - ipc_socket:/tmp/ids_ipc
    depends_on:
      inference:
        condition: service_healthy

  # ── Inference engine (Python) ──────────────────────────────────────────────
  inference:
    build: ./inference
    container_name: ids_inference
    volumes:
      - ipc_socket:/tmp/ids_ipc
      # Dashboard dist/ built on host by launch.py before docker-compose runs
      - ./dashboard/dist:/app/static:ro
      # OIF model state persists across container restarts on the host.
      # Files are written by the inference engine; ignored by git.
      - ./inference/models:/app/models
      # Analyst config (thresholds etc.) persists across container restarts.
      - ./inference/config.json:/app/config.json
      # SQLite flow DB persists across container restarts on the host.
      - ./data:/app/data
    ports:
      - "8765:8765"
    networks:
      ids_net:
        ipv4_address: 172.20.0.31
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 3

networks:
  ids_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  ipc_socket:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
